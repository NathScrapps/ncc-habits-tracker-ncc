version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — local dev database (mirrors Neon schema)
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: habit_user
      POSTGRES_PASSWORD: habit_pass
      POSTGRES_DB: habit_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habit_user -d habit_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend — Fastify API
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://habit_user:habit_pass@db:5432/habit_tracker
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      REFRESH_SECRET: ${REFRESH_SECRET:?REFRESH_SECRET is required}
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: info
    ports:
      - "4000:4000"

  # ---------------------------------------------------------------------------
  # Frontend — Nginx serving Vite build output
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
