name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate -w @habit-tracker/backend

      - name: Lint
        run: npm run lint -w @habit-tracker/backend

      - name: Test
        run: npm run test -w @habit-tracker/backend

      - name: Build
        run: npm run build -w @habit-tracker/backend

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -w @habit-tracker/frontend

      - name: Test
        run: npm run test -w @habit-tracker/frontend

      - name: Build
        run: npm run build -w @habit-tracker/frontend
